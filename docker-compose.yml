services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      OLLAMA_BASE_URL: "http://ollama:11434"
      DUNIA_DEFAULT_PROVIDER: "ollama"
    volumes:
      - sqlite-data:/app/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  sqlite-data:
  ollama-data:
